name: Deploy dashboard to GitHub Pages

# Standalone build for the PUBLIC published mirror of the TN Stranded Talent
# dashboard. The app lives at the repo root here (not under dashboard/), and the
# view store is the committed viewstore/ snapshot (there is no output/ tree in
# this repo). Do not edit by hand — this file is written by
# tools/publish_dashboard/export.mjs in the private source repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Build (prebuild sync -> vite build -> bundle guard)
        run: npm run build
        env:
          VITE_BASE: /tn-stranded-talent-dashboard/
          # VITE_REPORT_DOCX intentionally unset -> the report download button is
          # hidden. Set it to '1' (and commit the .docx into public/) only once the
          # report is cleared for public release.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
